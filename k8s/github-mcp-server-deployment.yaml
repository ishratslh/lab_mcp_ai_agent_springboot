apiVersion: v1
kind: Namespace
metadata:
  name: lab-agent
---
apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: lab-agent
type: Opaque
stringData:
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-mcp-server
  namespace: lab-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-mcp-server
  template:
    metadata:
      labels:
        app: github-mcp-server
    spec:
      containers:
      - name: github-mcp-server
        image: ghcr.io/github/github-mcp-server:latest
        ports:
        - containerPort: 3333
        env:
        - name: GITHUB_PERSONAL_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: agent-secrets
              key: GITHUB_PERSONAL_ACCESS_TOKEN
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: github-mcp-server
  namespace: lab-agent
spec:
  type: ClusterIP
  selector:
    app: github-mcp-server
  ports:
  - protocol: TCP
    port: 3333
    targetPort: 3333

